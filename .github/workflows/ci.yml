name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [ecs, phpstan, rector]
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker images
        run: docker compose build
      - name: Start services
        run: docker compose up -d
      - name: Wait for PHP container ready
        run: |
          for i in $(seq 1 60); do
            if docker compose exec -T php php bin/console --version 2>/dev/null; then
              echo "PHP container ready"
              break
            fi
            echo "Waiting for PHP... ($i/60)"
            sleep 5
          done
      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            ecs) docker compose exec -T php vendor/bin/ecs check ;;
            phpstan) docker compose exec -T php vendor/bin/phpstan analyse --memory-limit=512M ;;
            rector) docker compose exec -T php vendor/bin/rector process --dry-run ;;
          esac

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker images
        run: docker compose build
      - name: Start services
        run: docker compose up -d
      - name: Wait for PHP container ready
        run: |
          for i in $(seq 1 60); do
            if docker compose exec -T php php bin/console --version 2>/dev/null; then
              echo "PHP container ready"
              break
            fi
            echo "Waiting for PHP... ($i/60)"
            sleep 5
          done
      - name: Create test database schema
        run: docker compose exec -T -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app_test?serverVersion=17" php php bin/console doctrine:schema:create --no-interaction
      - name: Unit tests
        run: docker compose exec -T php vendor/bin/phpunit --testsuite=unit
      - name: Integration tests
        run: docker compose exec -T php vendor/bin/phpunit --testsuite=integration
      - name: Functional tests
        run: docker compose exec -T php vendor/bin/phpunit --testsuite=functional
